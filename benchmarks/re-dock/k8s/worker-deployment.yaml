# RE-DOCK Worker Deployments
# 8 replicas with geometric temperature ladder: 298.0 → 600.0 K
# Cold replicas (low T) get more CPU/memory for thorough sampling.
# Hot replicas (high T) need less — they explore more freely.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redock-worker-0
  namespace: flexaids-redock
  labels: &labels-0
    app: redock-worker
    replica-index: "0"
    temperature-tier: cold
spec:
  replicas: 1
  selector:
    matchLabels: *labels-0
  template:
    metadata:
      labels: *labels-0
    spec:
      containers:
        - name: worker
          image: ghcr.io/nrglab/flexaids-worker:latest
          env:
            - name: REPLICA_INDEX
              value: "0"
            - name: REPLICA_TEMPERATURE
              value: "298.0"
          envFrom:
            - configMapRef:
                name: redock-config
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: "4"
              memory: 8Gi
            limits:
              cpu: "8"
              memory: 16Gi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: checkpoints
              mountPath: /checkpoints
          readinessProbe:
            httpGet:
              path: /api/status
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /api/status
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 60
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: redock-data
        - name: checkpoints
          persistentVolumeClaim:
            claimName: redock-checkpoints
