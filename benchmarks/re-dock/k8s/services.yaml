# RE-DOCK Services
# Headless service for DNS discovery + per-replica ClusterIP services
---
# Headless service: enables DNS like redock-worker-{i}.redock-workers.flexaids-redock.svc
apiVersion: v1
kind: Service
metadata:
  name: redock-workers
  namespace: flexaids-redock
  labels:
    app: redock-worker
spec:
  clusterIP: None
  selector:
    app: redock-worker
  ports:
    - port: 8000
      targetPort: 8000
      name: http
---
# Per-replica services for direct exchange communication
apiVersion: v1
kind: Service
metadata:
  name: redock-worker-0
  namespace: flexaids-redock
  labels:
    app: redock-worker
    replica-index: "0"
spec:
  selector:
    app: redock-worker
    replica-index: "0"
  ports:
    - port: 8000
      targetPort: 8000
      name: http
---
