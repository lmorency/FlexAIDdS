# benchmarks/datasets/lsd_docking.yaml
# --------------------------------------
# LSD.docking.org 11-Target Benchmark
#
# Reference: Irwin et al.; lsd.docking.org
# 11 targets from the DOCKING (Shoichet Lab) validated virtual screening
# campaigns with experimentally confirmed hits.

name: lsd_docking
version: "2023"
description: >
  11 validated virtual-screening targets from lsd.docking.org, each
  with published hit rates and confirmed actives from prospective
  docking campaigns.  Provides orthogonal validation against true
  experimental hit rates (not retrospective enrichment).

n_targets: 11
protocol: prospective_vs
tier: 2

tier1_subset:
  - d4_receptor     # D4 dopamine receptor (CNS)
  - mecp2           # methyl-CpG-binding protein 2
  - mpro_sars2      # SARS-CoV-2 main protease

data:
  source: lsd.docking.org
  local_root: "${FLEXAIDS_DATA}/lsd_docking"
  receptor_dir:  "{target}/receptor.pdb"
  actives_ism:   "{target}/actives.ism"
  decoys_ism:    "{target}/decoys.ism"
  hit_rate_csv:  "lsd_hit_rates.csv"

metrics:
  primary: entropy_rescue_rate
  secondary:
    - enrichment_factor
    - hit_rate_top_n          # HR@500 (standard for LSD campaigns)
    - log_auc
    - target_specificity_zscore

flexaids_params:
  ga_iterations: 200
  population_size: 100
  temperature: 298.15
  use_entropy: true
  entropy_weight: 1.0
  n_poses: 10
  screen_mode: true

targets:
  - name: d4_receptor
    uniprot: "P21917"
    family: gpcr
    campaign: "Lyu et al. Nature 2019"
    n_actives: 549
    experimental_hit_rate: 0.29   # fraction confirmed by binding assay
    top_n_screened: 500

  - name: mecp2
    uniprot: "P51608"
    family: epigenetic
    campaign: "Boike et al. Nat. Chem. Biol. 2022"
    n_actives: 136
    experimental_hit_rate: 0.21
    top_n_screened: 500

  - name: mpro_sars2
    uniprot: "P0DTD1"
    family: protease
    campaign: "Gorgulla et al. Nature 2020 (COVID Moonshot)"
    n_actives: 1207
    experimental_hit_rate: 0.11
    top_n_screened: 1000

  - name: adrb2
    uniprot: "P07550"
    family: gpcr
    campaign: "Shoichet lab"
    n_actives: 80
    experimental_hit_rate: 0.24
    top_n_screened: 200

  - name: 5ht2b
    uniprot: "P41595"
    family: gpcr
    campaign: "Shieh et al. Nat. Chem. Biol. 2023"
    n_actives: 232
    experimental_hit_rate: 0.33
    top_n_screened: 500

  - name: orexin2
    uniprot: "O43614"
    family: gpcr
    campaign: "Stein et al. Nature 2020"
    n_actives: 205
    experimental_hit_rate: 0.18
    top_n_screened: 500

  - name: gaba_a
    uniprot: "P14867"
    family: ion_channel
    campaign: "Kobilka lab VS"
    n_actives: 123
    experimental_hit_rate: 0.15
    top_n_screened: 500

  - name: fatty_acid_bp
    uniprot: "Q01469"
    family: lipid_binding
    campaign: "UCSF docking study"
    n_actives: 90
    experimental_hit_rate: 0.20
    top_n_screened: 300

  - name: nsp14_sars2
    uniprot: "P0DTD1_NSP14"
    family: methyltransferase
    campaign: "COVID Moonshot"
    n_actives: 445
    experimental_hit_rate: 0.09
    top_n_screened: 1000

  - name: traf2
    uniprot: "Q12933"
    family: e3_ligase
    campaign: "Shoichet lab 2022"
    n_actives: 55
    experimental_hit_rate: 0.22
    top_n_screened: 200

  - name: kdm5c
    uniprot: "P41229"
    family: epigenetic
    campaign: "Fragment-to-lead VS"
    n_actives: 78
    experimental_hit_rate: 0.19
    top_n_screened: 300

reproducibility:
  seed: 11
  note: >
    Use experimental hit rates for absolute calibration.
    Prospective campaigns do not have pre-defined decoy sets —
    generate property-matched decoys using DUD-E protocol.
