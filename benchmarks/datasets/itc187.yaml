# benchmarks/datasets/itc187.yaml
# ----------------------------------
# ITC-187 Isothermal Titration Calorimetry Benchmark
#
# 187 protein–ligand complexes with high-quality ITC measurements providing
# ΔH, ΔS, and ΔG separately — the only dataset that can directly validate
# the entropy (ΔS) scoring component of FlexAIDdS.
#
# Sources:
#   BindingDB (https://www.bindingdb.org) ITC subset
#   NIST ThermoML archive (https://trc.nist.gov)
#   ChEMBL ITC curated subset (https://www.ebi.ac.uk/chembl)

name: itc187
version: "1.0"
description: >
  187 ITC-measured protein–ligand complexes with separate ΔH and −TΔS
  components.  This dataset is the primary calibration benchmark for
  FlexAIDdS entropy scoring: it allows direct comparison of predicted
  vs measured ΔS contributions.  ITC data provide thermodynamic
  fingerprints (enthalpy-driven vs entropy-driven binding) that are
  inaccessible from Kd-only datasets.

n_targets: 187
protocol: itc
tier: 2

tier1_subset:
  # 5 well-characterised ITC complexes with clean stoichiometry
  - "BDB_44560"   # FKBP12 / rapamycin analog
  - "BDB_19875"   # HIV protease / KNI-272
  - "BDB_36812"   # avidin / biotin (enthalpy + entropy reference)
  - "BDB_22104"   # thrombin / argatroban
  - "BDB_51330"   # carbonic anhydrase II / acetazolamide

data:
  source: BindingDB + NIST ThermoML
  local_root: "${FLEXAIDS_DATA}/itc187"
  affinity_csv:  "itc187_data.csv"
  receptor_dir:  "receptors/"
  ligand_dir:    "ligands/"
  columns:
    id:     "bdid"
    dG:     "dG_kcal_mol"    # ΔG (kcal/mol), negative = favourable
    dH:     "dH_kcal_mol"    # ΔH (kcal/mol)
    TdS:    "TdS_kcal_mol"   # −TΔS (kcal/mol) at T_exp
    T_exp:  "T_K"            # experimental temperature (K)
    pdbid:  "pdbid"          # PDB crystal structure (may be closest homologue)
    smiles: "smiles"

metrics:
  primary: entropy_rescue_rate
  secondary:
    - scoring_power           # Pearson r for ΔG
    - dH_pearson_r            # Pearson r for ΔH component
    - TdS_pearson_r           # Pearson r for −TΔS component
    - bootstrap_ci            # 95% CI on all primary metrics

flexaids_params:
  ga_iterations: 300
  population_size: 150
  temperature: null             # use T_exp from ITC record
  use_entropy: true
  entropy_weight: 1.0
  n_poses: 20

targets:
  # Selected ITC entries (illustrative; full list from affinity_csv)
  - { bdid: "BDB_44560", pdbid: "2pip", target: "fkbp12",
      dG: -12.4, dH: -10.8, TdS: -1.6, T_K: 298.15 }
  - { bdid: "BDB_19875", pdbid: "1kjf", target: "hiv_protease",
      dG: -14.1, dH: -6.2,  TdS: -7.9, T_K: 298.15 }
  - { bdid: "BDB_36812", pdbid: "1avd", target: "avidin",
      dG: -20.4, dH: -22.0, TdS:  1.6, T_K: 298.15 }
  - { bdid: "BDB_22104", pdbid: "1dwc", target: "thrombin",
      dG: -11.9, dH: -9.4,  TdS: -2.5, T_K: 298.15 }
  - { bdid: "BDB_51330", pdbid: "3hs4", target: "carbonic_anhydrase",
      dG: -6.8,  dH: -5.3,  TdS: -1.5, T_K: 298.15 }
  # ... (full list loaded dynamically from affinity_csv at runtime)

validation:
  # Expected performance benchmarks for FlexAIDdS
  expected_dG_pearson_r: 0.93    # target from internal benchmarks
  expected_rmse_kcal:    1.4     # kcal/mol
  expected_rescue_rate:  0.72    # 72% of enthalpy-missed actives rescued by ΔS

reproducibility:
  seed: 187
  note: >
    ITC measurements are sensitive to buffer conditions, pH, and
    stoichiometry.  Only single-site binding data (n ≈ 1.0 ± 0.1)
    are included.  Aggregators and denaturants excluded.
