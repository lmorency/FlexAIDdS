  - { name: fa7,    uniprot: "P08709", family: protease,    n_actives: 114,  n_decoys: 10000 }
  - { name: fgfr1,  uniprot: "P11362", family: kinase,      n_actives: 154,  n_decoys: 10000 }
  - { name: fkb1a,  uniprot: "P62942", family: isomerase,   n_actives: 120,  n_decoys: 10000 }
  - { name: fnta,   uniprot: "P49356", family: transferase, n_actives: 486,  n_decoys: 10000 }
