  - { name: mapk2,  uniprot: "P49137", family: kinase,      n_actives: 57,   n_decoys: 10000 }

reproducibility:
  seed: 37
  note: >
    Decoys are property-matched (MW, logP, charge, rotbonds, HBD, HBA)
    to actives.  Do NOT use DUD-E for selectivity benchmarks — decoys
    are not inactive compounds.  Conformation bias study: compare EF1%
    across holo/apo/af2 for each target.
