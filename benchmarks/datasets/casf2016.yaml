# benchmarks/datasets/casf2016.yaml
# -----------------------------------
# CASF-2016 Benchmark Set
# Reference: Su et al. J. Chem. Inf. Model. 2019, 59, 895–913
# DOI: 10.1021/acs.jcim.8b00545
#
# 285 high-quality protein–ligand complexes from PDBbind v2016 core set.
# Curated by resolution ≤ 2.5 Å, single-chain, no covalent bonds.
# Standard tasks: scoring power, ranking power, docking power, screening power.

name: casf2016
version: "2016"
description: >
  CASF-2016 core benchmark: 285 protein–ligand co-crystal structures with
  experimental binding affinities (Kd/Ki/IC50 → ΔG = RT ln Kd).
  Used to evaluate scoring, ranking, docking, and screening performance.

n_targets: 285
protocol: casf
tier: 2   # full set; tier-1 uses subset of 5 (see tier1_subset)

tier1_subset:
  # 5 diverse, structurally clean targets for PR sanity checks
  - "3ag9"   # CDK2
  - "1e66"   # trypsin
  - "4de2"   # HSP90
  - "1b9v"   # thrombin
  - "2pcp"   # aldose reductase

data:
  source: PDBbind
  url_template: "http://www.pdbbind.org.cn/download/PDBbind_v2016_core_set.tar.gz"
  local_root: "${FLEXAIDS_DATA}/casf2016"
  receptor_subdir: "coreset/{pdbid}/{pdbid}_protein.pdb"
  ligand_subdir:   "coreset/{pdbid}/{pdbid}_ligand.mol2"
  affinity_csv:    "coreset/INDEX/2016_core_data.csv"
  affinity_col:    "logKa"   # log10(Ka) = -ΔG / (RT ln 10)

metrics:
  primary: scoring_power        # Pearson r vs experimental ΔG
  secondary:
    - docking_power             # top-1 RMSD ≤ 2 Å success rate
    - enrichment_factor         # EF1% for screening evaluation
    - log_auc                   # semi-log ROC AUC
    - entropy_rescue_rate       # ΔS rescue of enthalpy misses (FlexAIDdS primary)
  rmsd_threshold: 2.0           # Å (CASF standard)
  ef_fraction: 0.01

flexaids_params:
  ga_iterations: 200
  population_size: 100
  temperature: 298.15           # K
  use_entropy: true
  entropy_weight: 1.0
  n_poses: 10                   # poses per target to evaluate

targets:
  # Representative sample — full list loaded at runtime from affinity_csv
  - { pdbid: "1a28", uniprot: "P00540", target: "src_kinase",    logKa: 7.52 }
  - { pdbid: "1b9v", uniprot: "P00734", target: "thrombin",      logKa: 8.30 }
  - { pdbid: "1cbs", uniprot: "P29373", target: "CRABPII",       logKa: 9.00 }
  - { pdbid: "1e66", uniprot: "P00760", target: "trypsin",       logKa: 4.52 }
  - { pdbid: "1f8d", uniprot: "P00742", target: "factorXa",      logKa: 5.74 }
  - { pdbid: "1fkg", uniprot: "P15923", target: "ptp1b",         logKa: 5.10 }
  - { pdbid: "1g2k", uniprot: "P00533", target: "egfr",          logKa: 6.22 }
  - { pdbid: "1h22", uniprot: "P25021", target: "neuraminidase", logKa: 9.20 }
  - { pdbid: "1ig3", uniprot: "Q16539", target: "p38map",        logKa: 7.89 }
  - { pdbid: "1o0h", uniprot: "P00517", target: "pka",           logKa: 8.66 }
  # ... (full list loaded dynamically from affinity_csv at runtime)

reproducibility:
  seed: 2016
  bundle: benchmarks/smoke/  # smoke tests draw 5 targets from this set
  expected_pearson_r: 0.650  # literature baseline (Vina-like)
  expected_success_rate: 0.85
