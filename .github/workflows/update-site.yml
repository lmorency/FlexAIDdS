name: Update Site

on:
  push:
    branches: [main, master]
    paths:
      - 'README.md'
      - 'docs/**'
      - 'site/**'
      - 'scripts/update_site_stats.py'
  schedule:
    - cron: '0 6 * * 1'    # Weekly Monday 06:00 UTC
  workflow_dispatch:

concurrency:
  group: site-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  update-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # Full history for accurate commit count

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update site stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_site_stats.py

      - name: Commit updated stats (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/index.html
          git diff --staged --quiet || git commit -m "Update: site stats (auto)" && git push

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true

  check-cmake-deps:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Check FetchContent dependency versions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/check_cmake_deps.py --create-issue
