name: Benchmark Tier 1 (PR Sanity)

# Lightweight benchmark gate on every PR to master.
# Runs 5 CASF-2016 targets with a 10-minute hard timeout.
# Posts results as a PR comment via a workflow summary + comment action.
#
# Failures: non-zero exit (metric regression) sets the check to "failure"
# so merges can be gated on this job.

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      dataset:
        description: "Dataset slug to benchmark"
        required: false
        default: "casf2016"
      tier1_subset_size:
        description: "Number of targets (overrides YAML default)"
        required: false
        default: "5"

concurrency:
  group: bench-tier1-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tier1-benchmark:
    name: Tier-1 Benchmark (${{ inputs.dataset || 'casf2016' }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATASET: ${{ inputs.dataset || 'casf2016' }}
      RESULTS_DIR: results/tier1
      FLEXAIDDS_BINARY: ${{ github.workspace }}/build/FlexAID

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scipy pyyaml

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build libeigen3-dev libomp-dev

      - name: Cache build
        id: cache-build
        uses: actions/cache@v5
        with:
          path: build
          key: tier1-build-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'LIB/**/*.cpp', 'LIB/**/*.h') }}
          restore-keys: |
            tier1-build-${{ runner.os }}-

      - name: Build FlexAIDdS (fast profile)
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DFLEXAIDS_USE_CUDA=OFF \
            -DFLEXAIDS_USE_METAL=OFF \
            -DFLEXAIDS_USE_AVX2=ON \
            -DFLEXAIDS_USE_OPENMP=ON \
            -DBUILD_TESTING=OFF \
            -DBUILD_PYTHON_BINDINGS=OFF
          cmake --build build --parallel --target FlexAID

      - name: Verify binary exists
        run: |
          if [ ! -f "$FLEXAIDDS_BINARY" ]; then
            echo "::warning::FlexAID binary not found at $FLEXAIDDS_BINARY — running in dry-run mode"
            echo "DRY_RUN=--dry-run" >> "$GITHUB_ENV"
          fi

      - name: Cache benchmark datasets
        uses: actions/cache@v5
        with:
          path: benchmark_data/${{ env.DATASET }}
          key: bench-data-${{ env.DATASET }}-v1
          restore-keys: |
            bench-data-${{ env.DATASET }}-

      - name: Run tier-1 benchmark
        timeout-minutes: 9
        env:
          PYTHONPATH: ${{ github.workspace }}/python
        run: |
          python -m benchmarks.run \
            --dataset "$DATASET" \
            --tier 1 \
            --results-dir "$RESULTS_DIR" \
            --datasets-dir benchmarks/datasets \
            --verbose \
            ${{ env.DRY_RUN }}

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier1-results-${{ env.DATASET }}-${{ github.run_id }}
          path: |
            ${{ env.RESULTS_DIR }}/
          retention-days: 30

      - name: Parse report for PR comment
        if: github.event_name == 'pull_request'
        id: parse-report
        run: |
          # Find the most recently written markdown report
          REPORT=$(find "$RESULTS_DIR" -name "*.md" | sort -r | head -1)
          if [ -n "$REPORT" ] && [ -f "$REPORT" ]; then
            # Truncate to 65535 characters (GitHub comment limit)
            python -c "
          import sys, textwrap
          content = open('$REPORT').read()
          if len(content) > 65000:
              content = content[:65000] + '\n\n_[truncated — see artifact for full report]_'
          print(content)
          " > report_truncated.md
            echo "REPORT_BODY<<EOF" >> "$GITHUB_OUTPUT"
            cat report_truncated.md >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "REPORT_BODY=No report generated." >> "$GITHUB_OUTPUT"
          fi

      - name: Comment benchmark results on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: benchmark-tier1
          message: |
            ## Benchmark Tier 1 Results

            ${{ steps.parse-report.outputs.REPORT_BODY }}

            > _Generated by `benchmark-tier1.yml` · run [`${{ github.run_id }}`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})_

      - name: Write job summary
        if: always()
        run: |
          REPORT=$(find "$RESULTS_DIR" -name "*.md" | sort -r | head -1)
          if [ -n "$REPORT" ] && [ -f "$REPORT" ]; then
            cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No benchmark report found." >> "$GITHUB_STEP_SUMMARY"
          fi
