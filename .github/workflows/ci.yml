name: FlexAID CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pure_python_results:
    name: Pure Python results tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest numpy scipy
      - name: Run pure-Python tests (no C++ extension needed)
        env:
          PYTHONPATH: python
        run: >
          pytest -q
          python/tests/test_results_io.py
          python/tests/test_results_loader_models.py
          python/tests/test_pdb_io.py
          python/tests/test_import_fallback.py
          python/tests/test_py_statmech.py
          python/tests/test_thermodynamics_dataclass.py
          python/tests/test_models.py
          python/tests/test_models_deserialization.py
          python/tests/test_version.py
          python/tests/test_io.py
          python/tests/test_cli.py
          python/tests/test_docking.py
          python/tests/test_results.py
          python/tests/test_energy_matrix.py
          python/tests/test_train_256x256.py
          python/tests/test_tencm.py
          python/tests/test_tencom_results.py
          python/tests/test_visualization.py

  cxx_core_build:
    name: C++ core (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-gcc
            os: ubuntu-latest
            cc: gcc
            cxx: g++
          - name: linux-clang
            os: ubuntu-latest
            cc: clang
            cxx: clang++
          - name: macos-clang
            os: macos-latest
            cc: clang
            cxx: clang++
            allow_failure: true
          - name: linux-gcc-avx512
            os: ubuntu-latest
            cc: gcc
            cxx: g++
            cmake_extra: "-DFLEXAIDS_USE_AVX512=ON -DBUILD_TESTING=OFF"
          - name: linux-gcc-mpi
            os: ubuntu-latest
            cc: gcc
            cxx: g++
            cmake_extra: "-DFLEXAIDS_USE_MPI=ON"
          - name: linux-gcc-asan
            os: ubuntu-latest
            cc: gcc
            cxx: g++
            cmake_extra: >-
              -DCMAKE_CXX_FLAGS='-fsanitize=address,undefined -fno-omit-frame-pointer -g'
              -DCMAKE_EXE_LINKER_FLAGS='-fsanitize=address,undefined'
          # windows-msvc excluded: deep MSVC C++20 incompatibilities in legacy sources
    steps:
      - uses: actions/checkout@v6
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          PKGS="cmake ninja-build libeigen3-dev libomp-dev"
          if [ "${{ matrix.name }}" = "linux-gcc-mpi" ]; then
            PKGS="$PKGS libopenmpi-dev openmpi-bin"
          fi
          sudo apt-get install -y $PKGS
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja libomp eigen
      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: |
          choco install ninja eigen -y
        shell: cmd
      - name: Configure
        shell: bash
        run: |
          export CC=${{ matrix.cc }}
          export CXX=${{ matrix.cxx }}
          CMAKE_ARGS=(
            -S . -B build -G Ninja
            -DCMAKE_BUILD_TYPE=Release
            -DFLEXAIDS_USE_CUDA=OFF
            -DFLEXAIDS_USE_METAL=OFF
            -DBUILD_PYTHON_BINDINGS=OFF
            -DBUILD_TESTING=ON
            ${{ matrix.cmake_extra }}
          )
          # Homebrew on Apple Silicon installs to /opt/homebrew
          if [ "$RUNNER_OS" = "macOS" ]; then
            CMAKE_ARGS+=(-DCMAKE_PREFIX_PATH="$(brew --prefix)")
            CMAKE_ARGS+=(-DBUILD_TESTING=OFF)
            CMAKE_ARGS+=(-DOpenMP_ROOT="$(brew --prefix libomp)")
          fi
          cmake "${CMAKE_ARGS[@]}"
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        if: matrix.name == 'linux-gcc' || matrix.name == 'linux-clang' || matrix.name == 'linux-gcc-mpi' || matrix.name == 'linux-gcc-asan'
        run: ctest --test-dir build --output-on-failure

  python_bindings_smoke:
    name: Python bindings smoke (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
          - name: windows
            os: windows-latest
            allow_failure: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libeigen3-dev
          python -m pip install --upgrade pip
          python -m pip install 'pybind11[global]' pytest numpy
      - name: Install build dependencies (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          choco install ninja eigen -y
          python -m pip install --upgrade pip
          python -m pip install "pybind11[global]" pytest numpy
      - name: Configure Python bindings (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build-python -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_PYTHON_BINDINGS=ON \
            -DPYBIND11_FINDPYTHON=ON \
            -DFLEXAIDS_USE_OPENMP=OFF \
            -DFLEXAIDS_USE_CUDA=OFF \
            -DFLEXAIDS_USE_METAL=OFF \
            -DCMAKE_LIBRARY_OUTPUT_DIRECTORY=${{ github.workspace }}/python/flexaidds
      - name: Configure Python bindings (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -S . -B build-python -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_C_COMPILER=cl ^
            -DCMAKE_CXX_COMPILER=cl ^
            -DBUILD_PYTHON_BINDINGS=ON ^
            -DPYBIND11_FINDPYTHON=ON ^
            -DFLEXAIDS_USE_OPENMP=OFF ^
            -DFLEXAIDS_USE_CUDA=OFF ^
            -DFLEXAIDS_USE_METAL=OFF ^
            -DCMAKE_LIBRARY_OUTPUT_DIRECTORY=${{ github.workspace }}\python\flexaidds
      - name: Build Python extension (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build-python --parallel --target _core
      - name: Build Python extension (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --build build-python --parallel --target _core
      - name: Run Python binding tests
        env:
          PYTHONPATH: python
        run: |
          python -m pip install scipy
          pytest -q python/tests/test_statmech_smoke.py python/tests/test_statmech.py python/tests/test_thermodynamics.py python/tests/test_encom.py python/tests/test_energy_matrix.py python/tests/test_train_256x256.py
