name: Sanitizers

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  linux-clang-asan-ubsan:
    name: Linux clang with ASan and UBSan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang libeigen3-dev libomp-dev

      - name: Configure
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake -S . -B build-sanitizers -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DFLEXAIDS_USE_CUDA=OFF \
            -DFLEXAIDS_USE_METAL=OFF \
            -DBUILD_PYTHON_BINDINGS=OFF \
            -DBUILD_TESTING=ON \
            -DCMAKE_C_FLAGS='-fsanitize=address,undefined -fno-omit-frame-pointer' \
            -DCMAKE_CXX_FLAGS='-fsanitize=address,undefined -fno-omit-frame-pointer' \
            -DCMAKE_EXE_LINKER_FLAGS='-fsanitize=address,undefined' \
            -DCMAKE_SHARED_LINKER_FLAGS='-fsanitize=address,undefined'

      - name: Build
        run: cmake --build build-sanitizers --parallel

      - name: Run tests
        env:
          ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1:check_initialization_order=1
          UBSAN_OPTIONS: print_stacktrace=1
        run: ctest --test-dir build-sanitizers --output-on-failure
