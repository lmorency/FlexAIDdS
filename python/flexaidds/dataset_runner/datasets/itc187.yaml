# ITC-187 Calorimetry Gold Standard Configuration
#
# 187 protein-ligand complexes with full ITC thermodynamic decomposition:
#   ΔG (binding free energy), ΔH (enthalpy), −TΔS (entropic contribution)
#
# This is the primary validation set for FlexAIDdS's entropy-aware scoring.
# The entropy rescue rate metric is especially meaningful here because
# experimental −TΔS values provide ground truth for entropy-driven binding.
#
# FlexAIDdS target: r = 0.93, RMSE = 1.4 kcal/mol on full ITC dataset.
#
# References:
#   Chodera & Mobley (2013) Annu. Rev. Biophys. 42:121-142
#   Freire (2008) Drug Discov. Today 13(19-20):869-874
#   NRGlab internal dataset compilation

slug: itc187
name: "ITC-187 Calorimetry Gold Standard"
description: >
  187 protein-ligand complexes with experimental ITC thermodynamic decomposition
  (ΔG, ΔH, −TΔS at 298 K).  The primary validation set for FlexAIDdS entropic
  scoring: covers entropy-driven binders (|TΔS| > |ΔH|) that enthalpy-only
  scoring systematically fails to rank correctly.

zenodo_doi: "10.5281/zenodo.itc187"
download_url: ""
data_format: pdb
tier: 2
tier1_subset_size: 5

structural_states:
  - holo

# Representative ITC complexes (PDB codes + UniProt/gene)
targets:
  # Serine proteases
  - 1a4g   # Trypsin / benzamidine (entropy-driven)
  - 1c5c   # Thrombin / D-Phe-Pro-Arg-chloromethylketone
  - 2zff   # Factor Xa / inhibitor
  # Kinases
  - 2hz4   # p38α / SB203580 (enthalpy-driven)
  - 3ge7   # Syk / staurosporine
  - 3pxf   # CDK2 / purvalanol B
  # Nuclear receptors
  - 1xrj   # RXRα / 9-cis-retinoic acid
  - 2iok   # PPARγ / rosiglitazone
  - 3dzy   # ERα / estradiol (entropy-driven)
  # Chaperones
  - 1byq   # HSP90α / geldanamycin
  - 2wi2   # HSP70 / VER-155008
  # HIV enzymes
  - 1t3r   # HIV-1 protease / ritonavir
  - 1tvr   # HIV-1 RT / nevirapine
  # GPCR allosteric sites
  - 2rh1   # β2-AR / carazolol (entropy-driven)
  # Antibiotics targets
  - 1p62   # DHFR / methotrexate
  - 2dri   # L-arabinose binding protein (entropy-driven)
  # Protein-protein interaction disruptors
  - 4n7h   # MDM2 / nutlin-3a
  - 4uyw   # BRD4 / JQ1 (entropy-driven)
  # Ion channels
  - 2bg9   # KcsA / tetraethylammonium
  # Carbohydrate-binding
  - 1cbg   # Concanavalin A / methyl α-D-glucoside
  # Metalloenzymes
  - 1qyf   # Carbonic anhydrase II / ethoxzolamide
  - 2osm   # MMP-1 / hydroxamate inhibitor
  # Oxidoreductases
  - 1ai4   # Aldose reductase / tolrestat
  - 3g0e   # LDH-A / oxamate (entropy-driven)
  # CNS targets
  - 6cm4   # D3R / eticlopride (entropy-driven)
  - 5wiu   # 5-HT2A / risperidone
  - 4ybv   # DAT / cocaine analog
  # Antivirals
  - 4qxm   # Mac1 (SARS-CoV-2 macrodomain) / ADP-ribose
  # NOTE: Full 187-complex list is provided with the NRGlab ITC compilation.

metrics:
  - scoring_power_pearson_r
  - scoring_power_spearman_r
  - scoring_power_rmse
  - scoring_power_mae
  - entropy_rescue_rate
  - docking_power_top1

# The key discriminator: entropy_rescue_rate measures how often −TΔS correction
# rescues complexes where ΔH alone would rank the crystal pose outside top-3.
expected_baselines:
  scoring_power_pearson_r: 0.93
  scoring_power_spearman_r: 0.90
  scoring_power_rmse: 1.40
  scoring_power_mae: 1.05
  entropy_rescue_rate: 0.72
  docking_power_top1: 0.78

baseline_tolerance: 0.05

# ITC-specific: experimental affinity field is ΔG in kcal/mol at 298 K
active_label_field: is_active
