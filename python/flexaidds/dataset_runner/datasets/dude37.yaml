# DUD-E 37-Target Cross-Docking Subset
#
# 37 targets from the Directory of Useful Decoys Enhanced (DUD-E), selected
# to test cross-docking performance across holo, apo, and AlphaFold2 structures.
#
# Three receptor states per target allow assessment of:
#   - holo:  crystal structure with co-crystallised ligand (ideal)
#   - apo:   apo crystal structure (no bound ligand; practical scenario)
#   - af2:   AlphaFold2 predicted structure (computationally accessible)
#
# Entropy rescue rate is especially relevant for apo/AF2 receptors where
# induced-fit conformational entropy is significant.
#
# Reference: Mysinger et al. (2012) J. Med. Chem. 55(14):6582-6594
#            https://doi.org/10.1021/jm300687e
#
# AF2 structures: UniProt-mapped AlphaFold DB v4

slug: dude37
name: "DUD-E 37-Target Cross-Docking"
description: >
  37-target subset of DUD-E with holo, apo, and AlphaFold2 receptor structures
  for rigorous cross-docking assessment.  Tests VS enrichment and entropy-based
  rescue across three structural states that represent real-world docking scenarios.

zenodo_doi: "10.5281/zenodo.dude37"
download_url: "https://dude.docking.org/"
data_format: mol2
tier: 2
tier1_subset_size: 5

structural_states:
  - holo
  - apo
  - af2

targets:
  # Kinases
  - EGFR    # Epidermal growth factor receptor
  - CDK2    # Cyclin-dependent kinase 2
  - SRC     # Proto-oncogene tyrosine kinase Src
  - LCK     # Lymphocyte-specific protein tyrosine kinase
  - VGFR2   # Vascular endothelial growth factor receptor 2
  - ROCK1   # Rho-associated coiled-coil kinase 1
  - MK14    # p38α MAP kinase
  - MK01    # ERK2
  - MP2K1   # MEK1
  # Proteases
  - HIVPR   # HIV protease
  - THRB    # Thrombin
  - RENI    # Renin
  - FA7     # Coagulation factor VII
  - FA10    # Coagulation factor Xa
  # Nuclear receptors
  - PPARG   # Peroxisome proliferator-activated receptor γ
  - PPARA   # PPARα
  - PPARD   # PPARδ
  - RXRA    # Retinoid X receptor α
  - ESR1    # Estrogen receptor α
  - ESR2    # Estrogen receptor β
  - ANDR    # Androgen receptor
  - PRGR    # Progesterone receptor
  - MCR     # Mineralocorticoid receptor
  # Oxidoreductases
  - HMDH    # HMG-CoA reductase
  - CP2C9   # CYP2C9
  - CP3A4   # CYP3A4
  - AOFB    # MAO-B
  - PYRD    # Dihydroorotate dehydrogenase
  # Glycolytic enzymes
  - PYGM    # Glycogen phosphorylase
  - GLCM    # Glucocerebrosidase
  # Other druggable targets
  - BACE1   # β-secretase
  - AMPC    # AmpC β-lactamase
  - HDAC2   # Histone deacetylase 2
  - HDAC8   # Histone deacetylase 8
  - HIVRT   # HIV reverse transcriptase
  - PARP1   # Poly(ADP-ribose) polymerase 1
  - MMP13   # Matrix metalloproteinase 13

metrics:
  - ef_1pct
  - ef_5pct
  - log_auc
  - docking_power_top1
  - docking_power_top3
  - entropy_rescue_rate
  - hit_rate_top10
  - target_specificity_zscore

expected_baselines:
  ef_1pct: 15.2
  ef_5pct: 8.4
  log_auc: 0.65
  docking_power_top1: 0.76
  docking_power_top3: 0.88
  entropy_rescue_rate: 0.42
  hit_rate_top10: 0.38

baseline_tolerance: 0.05
active_label_field: is_active
