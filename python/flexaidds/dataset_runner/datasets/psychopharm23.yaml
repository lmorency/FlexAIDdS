# NRGlab Psychopharmacology Dataset — 23 CNS Targets
#
# Internal NRGlab benchmark covering 23 central nervous system drug targets:
# GPCRs, monoamine transporters, ion channels, and CNS-relevant enzymes.
#
# This dataset is the primary validation set for FlexAIDdS's psychopharmacology
# application domain.  Shannon entropy corrections are especially important here
# because many CNS targets have large, flexible binding pockets where
# configurational entropy dominates binding selectivity.
#
# FlexAIDdS target performance: 92% pose-rescue rate (entropy rescues correct
# binding mode for 92% of complexes misclassified by enthalpy alone).
#
# Data source: NRGlab internal compilation (Université de Montréal)
# Experimental data: Ki/Kd from ChEMBL + Ki Database + primary ITC measurements

slug: psychopharm23
name: "NRGlab Psychopharmacology 23-Target Dataset"
description: >
  23 CNS drug targets curated by NRGlab for psychopharmacology-focused docking
  benchmarks.  Includes class A GPCRs, monoamine transporters, Cys-loop ion
  channels, and key neuroactive enzymes.  Entropy-aware scoring is critical for
  selectivity discrimination across closely related receptor subtypes.

zenodo_doi: ""
download_url: ""   # NRGlab internal; set data_dir in environment
data_format: pdb
tier: 2
tier1_subset_size: 5

structural_states:
  - holo

targets:
  # --- Class A GPCRs (monoamine receptors) ---
  - D2R      # Dopamine D2 receptor        PDB: 6CM4
  - D3R      # Dopamine D3 receptor        PDB: 3PBL
  - D4R      # Dopamine D4 receptor        PDB: 5WIU
  - 5HT2A    # Serotonin 2A receptor       PDB: 6A93
  - 5HT2C    # Serotonin 2C receptor       PDB: 6BQG
  - 5HT6     # Serotonin 6 receptor        PDB: 4ZWJ (homology; AF2 preferred)
  - CB1R     # Cannabinoid CB1 receptor    PDB: 5XRA
  - H3R      # Histamine H3 receptor       PDB: 7LLP
  - M1R      # Muscarinic M1 receptor      PDB: 5CXV
  - M2R      # Muscarinic M2 receptor      PDB: 3UON
  - M3R      # Muscarinic M3 receptor      PDB: 4U14
  # --- Monoamine transporters (SLC6 family) ---
  - SERT     # Serotonin transporter       PDB: 5I6X
  - DAT      # Dopamine transporter        PDB: 4XP4
  - NET      # Norepinephrine transporter  PDB: 7LWD
  # --- Ionotropic receptors (ion channels) ---
  - NMDAR    # NMDA receptor (GluN1/GluN2B) PDB: 4PE5
  - GABAR    # GABA-A receptor (α1β2γ2)   PDB: 6DW0
  - NAV17    # Nav1.7 sodium channel       PDB: 7MN7 (partial)
  - KV12     # Kv1.2 potassium channel     PDB: 2A79
  # --- Sigma receptors ---
  - SIGR1    # Sigma-1 receptor            PDB: 5HK1
  - SIGR2    # Sigma-2 receptor (TMEM97)   PDB: 6DKZ
  # --- Monoamine oxidases ---
  - MAOA     # MAO-A                       PDB: 2BXS
  - MAOB     # MAO-B                       PDB: 1GOS
  # --- Other CNS-relevant enzyme ---
  - PARP1    # PARP1 (neuronal DNA repair) PDB: 4ZZZ

metrics:
  - entropy_rescue_rate
  - docking_power_top1
  - docking_power_top3
  - scoring_power_pearson_r
  - scoring_power_rmse
  - ef_1pct
  - log_auc
  - target_specificity_zscore

# FlexAIDdS is optimised for this domain — high entropy rescue rate expected.
expected_baselines:
  entropy_rescue_rate: 0.92
  docking_power_top1: 0.85
  docking_power_top3: 0.94
  scoring_power_pearson_r: 0.89
  scoring_power_rmse: 1.15
  ef_1pct: 16.8
  log_auc: 0.71

baseline_tolerance: 0.05
active_label_field: is_active
